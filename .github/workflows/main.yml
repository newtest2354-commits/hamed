name: VLESS IP Scanner CI/CD

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      speed_test:
        description: 'Run speed tests'
        required: false
        default: 'false'
        type: boolean
      max_per_source:
        description: 'Max IPs per source'
        required: false
        default: '500'
        type: string
      concurrency:
        description: 'Scan concurrency'
        required: false
        default: '30'
        type: string

permissions:
  contents: write
  actions: write

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Cache scanner data
      uses: actions/cache@v4
      with:
        path: ~/.vless_scanner
        key: vless-scanner-cache-${{ github.run_id }}
        restore-keys: |
          vless-scanner-cache-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download Xray
      run: |
        mkdir -p ~/.vless_scanner
        cd ~/.vless_scanner
        wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
        unzip -q -o Xray-linux-64.zip
        chmod +x xray
        rm Xray-linux-64.zip
    
    - name: Run IP Scanner
      env:
        VLESS_URI: ${{ secrets.VLESS_URI }}
        SPEED_TEST: ${{ github.event.inputs.speed_test == 'true' || 'false' }}
        MAX_PER_SOURCE: ${{ github.event.inputs.max_per_source || '500' }}
        CONCURRENCY: ${{ github.event.inputs.concurrency || '30' }}
      run: |
        if [ -z "$VLESS_URI" ]; then
          echo "Error: VLESS_URI secret is not set"
          exit 1
        fi
        
        python scanner.py --vless "$VLESS_URI" --global-ips --iran-ips --max-per-source $MAX_PER_SOURCE --concurrency $CONCURRENCY --timeout 8
        
        if [ "$SPEED_TEST" = "true" ]; then
          python scanner.py --vless "$VLESS_URI" --global-ips --iran-ips --max-per-source $MAX_PER_SOURCE --speed-test
        fi
    
    - name: Upload scan results
      uses: actions/upload-artifact@v4
      with:
        name: scan-results-${{ github.run_id }}
        path: ~/.vless_scanner/scan_results/
        retention-days: 7
    
    - name: Create GitHub Release
      if: github.event_name == 'schedule'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd ~/.vless_scanner/scan_results
        timestamp=$(date +"%Y%m%d_%H%M%S")
        zip -r "scan_results_${timestamp}.zip" .
        gh release create "scan_${timestamp}" "scan_results_${timestamp}.zip" \
          --notes "Automated scan results from $(date '+%Y-%m-%d %H:%M:%S')" \
          --repo ${{ github.repository }} || true
    
    - name: Commit and push results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        mkdir -p scan_results
        cp -r ~/.vless_scanner/scan_results/* scan_results/ 2>/dev/null || true
        git add scan_results/ || true
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update scan results $(date '+%Y-%m-%d %H:%M:%S')"
        git push || true

  cleanup:
    runs-on: ubuntu-latest
    needs: scan
    if: always()
    
    steps:
    - name: Delete old artifacts
      uses: actions/github-script@v7
      with:
        script: |
          const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            per_page: 100
          });
          
          const oldArtifacts = artifacts.artifacts.filter(a => {
            const createdAt = new Date(a.created_at);
            const now = new Date();
            const daysOld = (now - createdAt) / (1000 * 60 * 60 * 24);
            return daysOld > 3;
          });
          
          for (const artifact of oldArtifacts) {
            await github.rest.actions.deleteArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id
            });
            console.log(`Deleted artifact: ${artifact.name}`);
          }
